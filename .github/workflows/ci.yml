name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Run unit tests
        run: npx jest --config jest.config.ts --testPathPattern "src/__tests__/(auth|traffic|aggregationCron|duplicateDetection)\.test\.ts$" --runInBand --detectOpenHandles
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
          MONGODB_URI: mongodb://localhost:27017/ci-placeholder

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: app/build/reports/tests/
