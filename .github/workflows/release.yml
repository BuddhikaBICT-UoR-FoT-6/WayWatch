name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK with version tag
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             release-artifacts/waywatch-${{ github.ref_name }}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WayWatch ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## WayWatch ${{ github.ref_name }}

            ### Download
            - `waywatch-${{ github.ref_name }}-debug.apk` — debug build (sideload enabled)

            ### What's included
            - Kotlin/Jetpack Compose Android client
            - TomTom-powered map, search & reverse geocoding
            - JWT-authenticated traffic reporting pipeline
            - OSMDroid route overlays with severity colour coding
          files: release-artifacts/waywatch-${{ github.ref_name }}-debug.apk
          draft: false
          prerelease: false
